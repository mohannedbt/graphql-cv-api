enum Role {       # Why enum? So role can ONLY be USER or ADMIN
  USER             # not "admin", not "superuser", not a typo
  ADMIN
}

type User {
  id: ID!
  name: String!
  email: String!
  role: Role!
  cvs: [Cv!]!    # you're promising clients they can get a user's CVs
}
type Cv {
  id: ID!
  name: String!
  age: Int!
  job: String!
  owner: User!
  skills: [Skill!]!  # ← add this line to Cv type
}
type Skill {
  id: ID!
  name: String!
}


# --- Mutation Inputs ---
input AddCvInput {
  id: ID!
  name: String!
  age: Int!
  job: String!
  owner: ID!
  skillIds: [String!]!
}

input UpdateCvInput {
  id: ID!
  name: String
  age: Int
  job: String
  owner: ID
  skillIds: [String]
}

type Mutation {
  addCv(input: AddCvInput!): Cv!
  updateCv(input: UpdateCvInput!): Cv!
  deleteCv(id: ID!): Boolean!
}

type Query {
  _empty: String        # keep Person 4's placeholder
  user(id: ID!): User   # get one user by id
  users: [User!]!
  cv(id: ID!): Cv        # get one cv by id
  cvs: [Cv!]!          # get all cvs
}

type CvUpdatePayload {
  cv: Cv
  operation: String!
}


type Subscription{
  cvUpdated: CvUpdatePayload!
}